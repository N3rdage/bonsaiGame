name: Question
description: Ask about the code, the architecture, or the AI-collaboration experiment.
labels: [question]
body:
  - type: markdown
    attributes:
      value: |
        Before asking, a quick check:
        - Gameplay / controls / mechanics: see [`README.md`](../../blob/main/README.md)
        - Code architecture: see [`ARCHITECTURE.md`](../../blob/main/ARCHITECTURE.md)
        - The AI-collaboration angle: see the [`blog/`](../../tree/main/blog) dir

  - type: textarea
    id: question
    attributes:
      label: Your question
    validations:
      required: true
